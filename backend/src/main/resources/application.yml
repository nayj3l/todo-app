spring:
  application:
    name: todo-backend
  datasource:
    url: jdbc:mysql://localhost:3307/todoapp
    username: todo
    password: todo
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 9090
  forward-headers-strategy: framework

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5174}
  backup:
    base-path: ../data/backup/users
  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}
